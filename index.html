<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumbres Ops - Panel de Mando</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; padding-bottom: 100px; color: #1e293b; }
        h1, h2, h3, .font-p { font-family: 'Poppins', sans-serif; }
        
        .tower-card { transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.05); border-radius: 1.25rem; }
        .tower-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .task-card { border-left-width: 6px; background: white; border-radius: 1rem; border: 1px solid #f1f5f9; transition: all 0.2s; }
        .task-card:hover { transform: translateX(3px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .task-overdue { border-left-color: #ef4444; }
        .task-in-progress { border-left-color: #6366f1; }
        .task-new { border-left-color: #10b981; }
        .task-completed { border-left-color: #cbd5e1; opacity: 0.7; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
        
        .tab-btn { padding: 0.75rem 1.5rem; font-weight: 700; font-size: 0.875rem; border-radius: 0.75rem; transition: all 0.2s; }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        .tab-inactive { background: #e2e8f0; color: #64748b; }
    </style>
</head>
<body class="antialiased text-gray-900">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 text-center md:text-left">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold uppercase tracking-tight text-slate-800">Cumbres <span class="text-indigo-600">Ops</span></h1>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-slate-400" id="current-date">Sincronizando base de datos...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="copiarReporte()" class="bg-white text-slate-700 border border-slate-200 px-6 py-3 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition">📋 WHATSAPP</button>
                <button onclick="abrirNueva()" class="bg-indigo-600 text-white px-8 py-3 rounded-full text-xs font-bold shadow-lg hover:bg-indigo-700 transition">+ NUEVA TAREA</button>
            </div>
        </header>

        <div class="flex gap-3 mb-8 justify-center md:justify-start">
            <button id="btn-activas" onclick="cambiarTab('activas')" class="tab-btn tab-active">⚡ Operaciones Activas</button>
            <button id="btn-historial" onclick="cambiarTab('historial')" class="tab-btn tab-inactive">✅ Historial Finalizadas</button>
        </div>

        <div id="tab-activas">
            <section class="mb-12">
                <div id="grid-torres" class="grid grid-cols-3 md:grid-cols-9 gap-3">
                    <div class="col-span-full text-center py-10 text-slate-300 animate-pulse font-bold">Cargando Torres...</div>
                </div>
            </section>
            <section id="canvas-tareas" class="space-y-8">
                <div class="text-center py-20 text-slate-400 font-bold animate-pulse">CARGANDO TAREAS...</div>
            </section>
        </div>

        <div id="tab-historial" style="display: none;">
            <section id="canvas-historial" class="space-y-3 bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                </section>
        </div>
    </div>

    <div id="modalTarea" class="modal">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-lg">
            <h2 id="modalTitulo" class="text-2xl font-p font-extrabold mb-6 text-slate-800">Gestionar Tarea</h2>
            <input type="hidden" id="f-id">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tarea / Nombre</label>
                    <input id="f-tarea" type="text" class="w-full border-2 border-slate-50 p-3 rounded-xl bg-slate-50 outline-none focus:border-indigo-400">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Descripción Técnica</label>
                    <textarea id="f-desc" rows="2" class="w-full border-2 border-slate-50 p-3 rounded-xl bg-slate-50 outline-none focus:border-indigo-400"></textarea>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Inicio</label>
                    <input id="f-inicio" type="date" class="w-full border-2 border-slate-50 p-3 rounded-xl text-sm bg-slate-50">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Límite (Due)</label>
                    <input id="f-due" type="date" class="w-full border-2 border-slate-50 p-3 rounded-xl text-sm bg-slate-50">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Categoría</label>
                    <select id="f-seccion" class="w-full border-2 border-slate-50 p-3 rounded-xl font-bold text-slate-600 bg-slate-50">
                        <option value="A. Tareas Prioritarias">A. Tareas Prioritarias</option>
                        <option value="B. Trabajos Normales">B. Trabajos Normales</option>
                        <option value="C. Pendientes Comunidad">C. Pendientes Comunidad</option>
                        <option value="D. Trabajos de Mantención">D. Trabajos de Mantención</option>
                        <option value="E. Equipos No Operativos">E. Equipos No Operativos</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Estado</label>
                    <select id="f-status" class="w-full border-2 border-indigo-50 p-3 rounded-xl font-bold text-indigo-600 bg-indigo-50/50">
                        <option value="NUEVA">NUEVA</option>
                        <option value="EN PROCESO">EN PROCESO</option>
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="ACTUALIZADO">ACTUALIZADO</option>
                        <option value="LISTO">✅ FINALIZADA (Historial)</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="cerrarModal()" class="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                <button onclick="enviarDatos()" id="btnGuardar" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE CONEXIÓN ===
        const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycby5qY-ISfM1zu8g1QDe7z6lafEWtzeiOwRQEG3wb_hFdJ5fq4PrEIQ9cqSWrMYp5Kkv/exec'; 
        const BASE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3oekURd6khMiA5uT5dJ-fYd7S56hAZMboNfrrqUu-VOGxjOEPGsuaSflihC6cwqcUh0Vte5wvdDJo/pub?output=csv&';
        const GID_TAREAS = '353601574';
        const GID_TORRES = '1484537224';

        let datosTareas = [];

        function init() {
            // Cargar Torres
            Papa.parse(`${BASE_CSV}gid=${GID_TORRES}`, {
                download: true, header: true,
                complete: function(r) { renderTorres(r.data); }
            });
            // Cargar Tareas
            Papa.parse(`${BASE_CSV}gid=${GID_TAREAS}`, {
                download: true, header: true,
                complete: function(r) { 
                    datosTareas = r.data.filter(t => t.Tarea);
                    renderTareas();
                }
            });
            document.getElementById('current-date').innerText = `Actualizado: ${new Date().toLocaleTimeString('es-CL')}`;
        }

        function cambiarTab(tab) {
            document.getElementById('tab-activas').style.display = tab === 'activas' ? 'block' : 'none';
            document.getElementById('tab-historial').style.display = tab === 'historial' ? 'block' : 'none';
            document.getElementById('btn-activas').className = tab === 'activas' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('btn-historial').className = tab === 'historial' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
        }

        function renderTorres(torres) {
            const container = document.getElementById('grid-torres');
            const temas = { 'ROJA': 'bg-red-500 text-white', 'AMARILLA': 'bg-yellow-400 text-slate-800', 'VERDE': 'bg-emerald-500 text-white' };
            container.innerHTML = torres.map(t => {
                const color = t.Nivel || t.Color || t.NIVEL || '';
                return `
                <div class="h-20 ${temas[color.toUpperCase()] || 'bg-slate-200'} tower-card flex flex-col items-center justify-center p-2 shadow-sm">
                    <span class="font-extrabold text-xl">${t.Torre || t.TORRE}</span>
                    <span class="text-[8px] font-bold uppercase opacity-80">${t.Estado || t.ESTADO || ''}</span>
                </div>`;
            }).join('');
        }

        function renderTareas() {
            const contActivas = document.getElementById('canvas-tareas');
            const contHistorial = document.getElementById('canvas-historial');
            contActivas.innerHTML = '';
            contHistorial.innerHTML = '';

            const activas = datosTareas.filter(t => t.Status !== 'LISTO');
            const historial = datosTareas.filter(t => t.Status === 'LISTO');

            // Render Activas por Sección
            const secciones = [...new Set(activas.map(t => t.Seccion).filter(s => s))];
            secciones.forEach(sec => {
                const tareasSec = activas.filter(t => t.Seccion === sec);
                let html = `<div><h3 class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-500"></span> ${sec}</h3><div class="space-y-3">`;
                
                tareasSec.forEach(t => {
                    const dias = calcularDias(t.Due);
                    const atrasada = dias < 0;
                    
                    let c = 'task-in-progress';
                    if (atrasada) c = 'task-overdue border-l-red-500';
                    else if (t.Status === 'NUEVA') c = 'task-new border-l-emerald-500';

                    html += `
                        <div class="task-card ${c} p-4 shadow-sm flex justify-between items-center group">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded">${t.ID || 'N/A'}</span>
                                    <h3 class="font-bold text-slate-700 text-sm">${t.Tarea}</h3>
                                </div>
                                <p class="text-[11px] text-slate-500 line-clamp-1 mb-2">${t.Descripcion || 'Sin detalles'}</p>
                                <div class="flex gap-4">
                                    <span class="text-[9px] font-bold text-slate-400">Inicio: ${t.Inicio || '--'}</span>
                                    <span class="text-[9px] font-bold ${atrasada ? 'text-red-500' : 'text-slate-400'}">Due: ${t.Due || '--'} ${atrasada ? '(!'+Math.abs(dias)+'d)' : ''}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 ml-4">
                                <span class="hidden md:inline text-[9px] font-extrabold px-3 py-1 rounded-full uppercase bg-indigo-50 text-indigo-600">${t.Status}</span>
                                <button onclick='abrirEditar(${JSON.stringify(t).replace(/'/g, "&#39;")})' class="p-2 text-slate-300 hover:text-indigo-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                            </div>
                        </div>`;
                });
                contActivas.innerHTML += html + `</div></div>`;
            });

            if(activas.length === 0) contActivas.innerHTML = '<p class="text-center text-slate-400 py-10">No hay tareas activas.</p>';

            // Render Historial
            if(historial.length === 0) {
                contHistorial.innerHTML = '<p class="text-center text-slate-400 py-10">Aún no hay tareas finalizadas.</p>';
            } else {
                historial.forEach(t => {
                    contHistorial.innerHTML += `
                    <div class="task-card task-completed p-4 flex justify-between items-center bg-slate-50">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black text-slate-400">${t.ID}</span>
                                <h3 class="font-bold text-slate-600 line-through text-sm">${t.Tarea}</h3>
                            </div>
                            <p class="text-[10px] text-slate-400 mt-1">${t.Seccion}</p>
                        </div>
                        <button onclick='abrirEditar(${JSON.stringify(t).replace(/'/g, "&#39;")})' class="text-[10px] font-bold text-indigo-500 px-3 py-1 rounded-full bg-indigo-50 hover:bg-indigo-100 transition">Reabrir</button>
                    </div>`;
                });
            }
        }

        function enviarDatos() {
            const btn = document.getElementById('btnGuardar');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const d = {
                id: document.getElementById('f-id').value,
                seccion: document.getElementById('f-seccion').value,
                tarea: document.getElementById('f-tarea').value,
                descripcion: document.getElementById('f-desc').value,
                inicio: document.getElementById('f-inicio').value,
                due: document.getElementById('f-due').value,
                status: document.getElementById('f-status').value
            };

            // URLSearchParams previene problemas de CORS en envíos a Google Apps Script
            const formData = new URLSearchParams();
            formData.append('data', JSON.stringify(d));

            fetch(URL_APPS_SCRIPT, { 
                method: 'POST', 
                body: formData 
            })
            .then(() => { 
                cerrarModal();
                alert("✅ Operación enviada. Los cambios aparecerán aquí tras la actualización de Google (1-3 min)."); 
                location.reload(); 
            })
            .catch(err => {
                alert("Error de conexión al enviar los datos.");
                btn.innerText = "Guardar Cambios"; btn.disabled = false;
            });
        }

        function copiarReporte() {
            let texto = `📋 *REPORTE CUMBRES - ${new Date().toLocaleDateString()}*\n\n`;
            datosTareas.filter(t => t.Status !== "LISTO").forEach(t => {
                const dias = calcularDias(t.Due);
                texto += `🔹 *[${t.ID}] ${t.Tarea}*\n   Status: ${t.Status} | Due: ${t.Due || '--'} ${dias < 0 ? '(!'+Math.abs(dias)+'d)' : ''}\n   _${t.Descripcion}_\n\n`;
            });
            navigator.clipboard.writeText(texto).then(() => alert("Reporte copiado para WhatsApp"));
        }

        function formatearParaInput(f) {
            if(!f) return '';
            if(f.includes('/')) { const p = f.split('/'); return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
            if(f.includes('-')) { const p = f.split('-'); return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; }
            return f;
        }

        function abrirNueva() { 
            document.getElementById('modalTitulo').innerText = "Nueva Tarea";
            document.getElementById('f-id').value = "";
            document.getElementById('f-tarea').value = "";
            document.getElementById('f-desc').value = "";
            document.getElementById('f-inicio').value = new Date().toISOString().split('T')[0];
            document.getElementById('f-due').value = "";
            document.getElementById('f-status').value = "NUEVA";
            document.getElementById('modalTarea').style.display = 'flex'; 
        }

        function abrirEditar(t) {
            document.getElementById('modalTitulo').innerText = "Editar " + t.ID;
            document.getElementById('f-id').value = t.ID;
            document.getElementById('f-seccion').value = t.Seccion;
            document.getElementById('f-tarea').value = t.Tarea;
            document.getElementById('f-desc').value = t.Descripcion;
            document.getElementById('f-inicio').value = formatearParaInput(t.Inicio);
            document.getElementById('f-due').value = formatearParaInput(t.Due);
            document.getElementById('f-status').value = t.Status;
            document.getElementById('modalTarea').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('modalTarea').style.display = 'none'; }
        
        function calcularDias(f) { 
            if(!f) return 0; 
            const p = f.includes('/') ? f.split('/') : f.split('-');
            const d = f.includes('/') ? new Date(p[2], p[1]-1, p[0]) : new Date(p[0], p[1]-1, p[2]);
            return Math.ceil((d - new Date().setHours(0,0,0,0)) / 86400000);
        }

        window.onload = init;
    </script>
</body>
</html>
