<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Mando Estratégico - Cumbres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f8fafc; padding-bottom: 100px; }
        .tower-card { transition: all 0.3s; border: 1px solid rgba(0,0,0,0.1); }
        .task-card { border-left-width: 6px; background: white; border-radius: 0.75rem; transition: transform 0.2s; }
        .task-overdue { border-left-color: #ef4444; }
        .task-in-progress { border-left-color: #3b82f6; }
        .task-new { border-left-color: #22c55e; }
        .task-updated { border-left-color: #f59e0b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold uppercase text-slate-800">Panel de Mando Estratégico</h1>
            <div class="flex justify-center items-center gap-4 mt-4">
                <span class="text-indigo-600 font-bold tracking-widest text-sm">CUMBRES DE QUILPUÉ</span>
                <button onclick="abrirModal()" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-xs font-bold shadow-lg hover:bg-indigo-700">+ NUEVA TAREA</button>
            </div>
        </header>

        <section class="mb-16">
            <div id="grid-torres" class="grid grid-cols-3 md:grid-cols-9 gap-3"></div>
        </section>

        <div id="canvas-tareas" class="space-y-10"></div>
    </div>

    <div id="modalTarea" class="modal">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-lg">
            <h2 id="modalTitulo" class="text-xl font-bold mb-6 text-slate-800">Nueva Tarea</h2>
            <input type="hidden" id="f-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Sección</label>
                    <select id="f-seccion" class="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 ring-indigo-500">
                        <option>A. Tareas Prioritarias</option>
                        <option>B. Trabajos Normales</option>
                        <option>C. Pendientes ComunidadFeliz</option>
                        <option>D. Trabajos de Mantención</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tarea</label>
                    <input id="f-tarea" type="text" class="w-full border p-3 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Descripción</label>
                    <textarea id="f-desc" class="w-full border p-3 rounded-xl h-24 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="f-inicio" type="date" class="border p-3 rounded-xl text-sm">
                    <input id="f-due" type="date" class="border p-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Estado</label>
                    <select id="f-status" class="w-full border p-3 rounded-xl font-bold text-indigo-600 outline-none">
                        <option value="NUEVA">NUEVA</option>
                        <option value="EN PROCESO">EN PROCESO</option>
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="LISTO">✅ FINALIZADA (Mover al Historial)</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="cerrarModal()" class="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                    <button onclick="enviarDatos()" id="btnGuardar" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - CAMBIA ESTO
        const URL_APPS_SCRIPT = 'TU_URL_DE_APPS_SCRIPT_AQUI'; 
        const BASE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3oekURd6khMiA5uT5dJ-fYd7S56hAZMboNfrrqUu-VOGxjOEPGsuaSflihC6cwqcUh0Vte5wvdDJo/pub?output=csv&';
        const GID_TAREAS = '353601574';
        const GID_TORRES = '1484537224';

        let datosTareas = [];

        async function init() {
            // Cargar Torres
            Papa.parse(`${BASE_CSV}gid=${GID_TORRES}`, {
                download: true, header: true,
                complete: function(r) { renderTorres(r.data); }
            });
            // Cargar Tareas
            Papa.parse(`${BASE_CSV}gid=${GID_TAREAS}`, {
                download: true, header: true,
                complete: function(r) { 
                    datosTareas = r.data.filter(t => t.Tarea);
                    renderTareas('all');
                }
            });
        }

        function renderTorres(torres) {
            const container = document.getElementById('grid-torres');
            const colores = {'ROJA': 'bg-red-500 text-white', 'AMARILLA': 'bg-yellow-400 text-slate-800', 'VERDE': 'bg-emerald-500 text-white'};
            container.innerHTML = torres.map(t => `
                <div class="h-24 ${colores[t.Nivel?.toUpperCase()] || 'bg-slate-200'} tower-card rounded-xl shadow-lg flex flex-col justify-center items-center text-center p-2">
                    <h4 class="font-bold text-lg">${t.Torre}</h4>
                    <span class="text-[9px] font-bold uppercase opacity-80">${t.Estado || ''}</span>
                </div>
            `).join('');
        }

        function renderTareas(filtro) {
            const container = document.getElementById('canvas-tareas');
            container.innerHTML = '';
            const secciones = [...new Set(datosTareas.map(t => t.Seccion))];

            secciones.forEach(sec => {
                const tareas = datosTareas.filter(t => t.Seccion === sec);
                let html = `<section><h2 class="text-xl font-bold mb-4 text-slate-800">${sec}</h2><div class="grid gap-3">`;
                
                tareas.forEach(t => {
                    const dias = calcularDias(t.Due);
                    const atrasada = dias < 0;
                    if (filtro === 'overdue' && !atrasada) return;

                    let c = 'task-in-progress';
                    if (atrasada) c = 'task-overdue';
                    else if (t.Status === 'NUEVA') c = 'task-new';

                    html += `
                        <div class="task-card ${c} p-4 shadow-sm border border-slate-100 flex justify-between items-center group">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="text-[10px] font-black text-slate-300">${t.ID}</span>
                                    <h3 class="font-bold text-slate-700">${t.Tarea}</h3>
                                </div>
                                <p class="text-xs text-slate-500 line-clamp-1">${t.Descripcion}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-[10px] font-bold px-2 py-1 rounded bg-slate-100">${t.Status}</span>
                                <button onclick='abrirEditar(${JSON.stringify(t)})' class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition">Editar</button>
                            </div>
                        </div>`;
                });
                container.innerHTML += html + `</div></section>`;
            });
        }

        function enviarDatos() {
            const btn = document.getElementById('btnGuardar');
            btn.innerText = "Guardando...";
            btn.disabled = true;

            const d = {
                id: document.getElementById('f-id').value,
                seccion: document.getElementById('f-seccion').value,
                tarea: document.getElementById('f-tarea').value,
                descripcion: document.getElementById('f-desc').value,
                inicio: document.getElementById('f-inicio').value,
                due: document.getElementById('f-due').value,
                status: document.getElementById('f-status').value
            };

            fetch(URL_APPS_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) })
            .then(() => { 
                alert("¡Base de datos actualizada!"); 
                location.reload(); 
            });
        }

        function abrirEditar(t) {
            document.getElementById('modalTitulo').innerText = "Editar " + t.ID;
            document.getElementById('f-id').value = t.ID;
            document.getElementById('f-seccion').value = t.Seccion;
            document.getElementById('f-tarea').value = t.Tarea;
            document.getElementById('f-desc').value = t.Descripcion;
            document.getElementById('f-status').value = t.Status;
            abrirModal();
        }

        function abrirModal() { document.getElementById('modalTarea').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modalTarea').style.display = 'none'; document.getElementById('f-id').value = ''; }
        function calcularDias(f) { 
            if(!f) return 0; const p = f.split(/[\.\/]/).map(Number);
            const d = new Date(p[2], p[1]-1, p[0]);
            return Math.ceil((d - new Date().setHours(0,0,0,0)) / 86400000);
        }

        init();
    </script>
</body>
</html>
