<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; color: #1e293b; }
        h1, h2, .font-p { font-family: 'Poppins', sans-serif; }
        .tower-card { border-radius: 1.25rem; transition: transform 0.2s; }
        .task-card { background: white; border-radius: 1rem; border-left: 6px solid #6366f1; transition: all 0.2s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .tab-btn { padding: 0.75rem 1.5rem; font-weight: 700; font-size: 0.875rem; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; border: none; }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        .tab-inactive { background: #e2e8f0; color: #64748b; }
        .tab-inactive:hover { background: #cbd5e1; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-6xl mx-auto px-4 pt-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Cumbres <span class="text-indigo-600">Ops</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Gestión Estratégica</p>
            </div>
            <div class="flex gap-3">
                <button onclick="copiarReporte()" class="bg-white text-slate-700 px-6 py-3 rounded-full font-bold shadow-sm border border-slate-200 text-xs hover:bg-slate-50 transition">📋 COPIAR REPORTE</button>
                <button onclick="abrirNueva()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-indigo-700 transition">+ NUEVA TAREA</button>
            </div>
        </header>

        <div class="flex gap-3 mb-8 justify-center md:justify-start">
            <button id="btn-activas" onclick="cambiarTab('activas')" class="tab-btn tab-active">⚡ Operaciones Activas</button>
            <button id="btn-historial" onclick="cambiarTab('historial')" class="tab-btn tab-inactive">✅ Historial Finalizadas</button>
        </div>

        <div id="tab-activas">
            <div id="grid-torres" class="grid grid-cols-3 md:grid-cols-9 gap-3 mb-12"></div>
            <div id="contenedor-activas" class="space-y-8">
                <p class="text-center text-slate-400 py-10 font-bold animate-pulse tracking-widest uppercase">CONECTANDO A BASE DE DATOS...</p>
            </div>
        </div>

        <div id="tab-historial" style="display: none;">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="font-p text-lg font-extrabold mb-6 text-emerald-600 flex items-center gap-2">✅ Tareas Completadas</h2>
                <div id="contenedor-finalizadas" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="modalTarea" class="modal">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-lg shadow-2xl">
            <h2 id="modalTitulo" class="text-2xl font-p font-extrabold mb-6">Gestionar Tarea</h2>
            <input type="hidden" id="f-id">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tarea / Nombre</label>
                    <input id="f-tarea" type="text" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-indigo-400 bg-slate-50">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Detalles Técnicos</label>
                    <textarea id="f-desc" rows="2" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none bg-slate-50"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Fecha Asignación</label>
                    <input id="f-inicio" type="date" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none bg-slate-50 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Fecha Límite (Due)</label>
                    <input id="f-due" type="date" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none bg-slate-50 text-sm">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Categoría</label>
                    <select id="f-seccion" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-600">
                        <option value="A. Tareas Prioritarias">A. Tareas Prioritarias</option>
                        <option value="B. Trabajos Normales">B. Trabajos Normales</option>
                        <option value="C. Pendientes Comunidad">C. Pendientes Comunidad</option>
                        <option value="D. Trabajos de Mantención">D. Trabajos de Mantención</option>
                        <option value="E. Equipos No Operativos">E. Equipos No Operativos</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Estado Operativo</label>
                    <select id="f-status" class="w-full border-2 border-indigo-100 p-3 rounded-xl font-bold text-indigo-600 bg-indigo-50">
                        <option value="NUEVA">NUEVA</option>
                        <option value="EN PROCESO">EN PROCESO</option>
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="LISTO">✅ FINALIZADA</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="cerrar()" class="flex-1 font-bold text-slate-400" id="btn-cancelar">Cerrar</button>
                <button onclick="guardar()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg" id="btn-guardar">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby5qY-ISfM1zu8g1QDe7z6lafEWtzeiOwRQEG3wb_hFdJ5fq4PrEIQ9cqSWrMYp5Kkv/exec';
        
        let datosGlobales = [];

        function cargar() {
            document.getElementById('contenedor-activas').innerHTML = '<p class="text-center text-slate-400 py-10 font-bold animate-pulse tracking-widest uppercase">SINCRONIZANDO...</p>';
            
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    if(data.error) throw new Error(data.error);
                    render(data);
                })
                .catch(err => {
                    document.getElementById('contenedor-activas').innerHTML = `<p class="text-center text-red-500 py-10 font-bold">Error de conexión: ${err.message}</p>`;
                });
        }

        function cambiarTab(tab) {
            document.getElementById('tab-activas').style.display = tab === 'activas' ? 'block' : 'none';
            document.getElementById('tab-historial').style.display = tab === 'historial' ? 'block' : 'none';
            document.getElementById('btn-activas').className = tab === 'activas' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('btn-historial').className = tab === 'historial' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
        }

        function render(res) {
            datosGlobales = res.tareas;
            const coloresTorres = { 'ROJA': 'bg-red-500 text-white', 'AMARILLA': 'bg-yellow-400 text-slate-800', 'VERDE': 'bg-emerald-500 text-white' };
            
            document.getElementById('grid-torres').innerHTML = res.torres.slice(1).map(f => `
                <div class="h-20 ${coloresTorres[(f[2]||"").toUpperCase().trim()] || 'bg-slate-200'} tower-card flex flex-col items-center justify-center p-2 shadow-sm">
                    <span class="font-extrabold text-xl">${f[0]}</span>
                    <span class="text-[8px] font-bold uppercase opacity-80">${f[1]}</span>
                </div>
            `).join('');

            const categorias = {};
            const finalizadas = [];

            res.tareas.slice(1).forEach(f => {
                if (!f[0]) return;
                if (f[6] === "LISTO") {
                    finalizadas.push(f);
                } else {
                    const sec = f[1] || "Sin Categoría";
                    if (!categorias[sec]) categorias[sec] = [];
                    categorias[sec].push(f);
                }
            });

            let htmlActivas = '';
            for (const [cat, tareas] of Object.entries(categorias)) {
                htmlActivas += `
                <div>
                    <h3 class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-500"></span> ${cat}
                    </h3>
                    <div class="space-y-3">
                        ${tareas.map(f => generarTarjeta(f, false)).join('')}
                    </div>
                </div>`;
            }
            document.getElementById('contenedor-activas').innerHTML = htmlActivas || '<p class="text-center text-slate-400 py-10">No hay tareas activas.</p>';

            document.getElementById('contenedor-finalizadas').innerHTML = finalizadas.length > 0 
                ? finalizadas.map(f => generarTarjeta(f, true)).join('') 
                : '<p class="text-center text-slate-400 py-10">Aún no hay tareas finalizadas.</p>';
        }

        function generarTarjeta(f, esHistorial) {
            const badgeColor = f[6] === 'NUEVA' ? 'bg-emerald-100 text-emerald-600' : 
                               f[6] === 'LISTO' ? 'bg-slate-200 text-slate-500' : 'bg-indigo-100 text-indigo-600';
            const opacity = esHistorial ? 'opacity-60 grayscale' : '';
            
            return `
            <div class="task-card p-4 border border-slate-100 shadow-sm flex justify-between items-center group ${opacity} ${esHistorial ? 'border-l-slate-400' : ''}">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[9px] font-black text-slate-400 tracking-tighter bg-slate-100 px-2 py-0.5 rounded">${f[0]}</span>
                        <h3 class="font-bold text-slate-700 text-sm ${esHistorial ? 'line-through' : ''}">${f[2]}</h3>
                    </div>
                    <p class="text-[11px] text-slate-500 line-clamp-1 mb-2">${f[3] || 'Sin detalles'}</p>
                    <div class="flex gap-4">
                        <span class="text-[9px] font-bold text-slate-400">Inicio: ${formatearFecha(f[4])}</span>
                        <span class="text-[9px] font-bold text-slate-400">Límite: ${formatearFecha(f[5])}</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-[9px] font-extrabold px-3 py-1 rounded-full uppercase ${badgeColor}">${f[6]}</span>
                    <button onclick='editar(${JSON.stringify(f)})' class="p-2 text-slate-300 hover:text-indigo-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                </div>
            </div>`;
        }

        function formatearFecha(f) {
            if(!f) return '--';
            if(f.includes('-')) { const p = f.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
            return f;
        }

        function formatearParaInput(f) {
            if(!f) return '';
            if(f.includes('/')) { const p = f.split('/'); return `${p[2]}-${p[1]}-${p[0]}`; }
            return f;
        }

        function copiarReporte() {
            let t = `📋 *REPORTE CUMBRES - ${new Date().toLocaleDateString()}*\n\n`;
            datosGlobales.slice(1).forEach(f => {
                if(f[6] !== "LISTO" && f[0]) t += `🔹 *[${f[0]}] ${f[2]}*\n   Status: ${f[6]} | Due: ${formatearFecha(f[5])}\n\n`;
            });
            navigator.clipboard.writeText(t).then(() => alert("Reporte copiado para WhatsApp."));
        }

        function abrirNueva() { 
            document.getElementById('f-id').value = ""; 
            document.getElementById('f-tarea').value = "";
            document.getElementById('f-desc').value = "";
            document.getElementById('f-inicio').value = new Date().toISOString().split('T')[0];
            document.getElementById('f-due').value = "";
            document.getElementById('modalTarea').style.display = 'flex'; 
        }
        
        function editar(f) { 
            document.getElementById('f-id').value = f[0]; 
            document.getElementById('f-seccion').value = f[1];
            document.getElementById('f-tarea').value = f[2];
            document.getElementById('f-desc').value = f[3];
            document.getElementById('f-inicio').value = formatearParaInput(f[4]);
            document.getElementById('f-due').value = formatearParaInput(f[5]);
            document.getElementById('f-status').value = f[6];
            document.getElementById('modalTarea').style.display = 'flex'; 
        }
        
        function cerrar() { document.getElementById('modalTarea').style.display = 'none'; }
        
        function guardar() {
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const d = {
                id: document.getElementById('f-id').value,
                seccion: document.getElementById('f-seccion').value,
                tarea: document.getElementById('f-tarea').value,
                desc: document.getElementById('f-desc').value,
                inicio: document.getElementById('f-inicio').value,
                due: document.getElementById('f-due').value,
                status: document.getElementById('f-status').value
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(d)
            })
            .then(res => res.json())
            .then(data => {
                cerrar();
                cargar();
                btn.innerText = "Guardar"; btn.disabled = false;
            })
            .catch(err => {
                alert("Error de guardado: Verifica tu conexión.");
                btn.innerText = "Guardar"; btn.disabled = false;
            });
        }
        
        window.onload = cargar;
    </script>
</body>
</html>
